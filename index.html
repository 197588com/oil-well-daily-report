<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>油井报表管理系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }

  .tab-inactive { color: #6b7280; }
  .tab-inactive:hover { color: #374151; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 1rem; }
  .input { border: 1px solid #d1d5db; border-radius: 0.375rem; padding: 0.5rem; width: 100%; font-size: 0.875rem; }
  .input:focus { outline: none; border-color: #2563eb; }

<body class="bg-gray-50 text-gray-800">
<div class="max-w-6xl mx-auto p-4">
  <header class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">🛢️ 油井报表管理系统</h1>
    <p class="text-sm text-gray-500">渤页平5 / 义页1-1VF / 义页1-2HF</p>
  </header>

  <!-- Tabs -->
  <nav class="flex space-x-6 mb-4 border-b border-gray-200">
    <button onclick="switchTab('history')" id="tab-history" class="tab-active pb-2">📋 历史报表</button>
    <button onclick="switchTab('input')" id="tab-input" class="tab-inactive pb-2">📝 录入今日数据</button>
    <button onclick="switchTab('coeff')" id="tab-coeff" class="tab-inactive pb-2">⚙️ 系数设置</button>
    <button onclick="switchTab('chart')" id="tab-chart" class="tab-inactive pb-2">📈 趋势分析</button>
    <button onclick="switchTab('daily')" id="tab-daily" class="tab-inactive pb-2">📰 日报生成</button>
  </nav>

  <!-- History -->
  <section id="page-history">
    <div class="flex justify-between items-center mb-3">
      <h2 class="text-lg font-bold">历史报表</h2>
      <div class="flex gap-2">
        <button class="btn-sec" onclick="exportHistoryCSV()">📥 导出CSV</button>
        <button class="btn-sec" onclick="exportJSON()">💾 备份JSON</button>
      </div>
    </div>
    <!-- 数据导入区 -->
    <div class="card mb-4 bg-amber-50 border-amber-200">
      <h3 class="font-bold text-amber-800 mb-2">🔄 新环境数据导入（上一天报表打底）</h3>
      <p class="text-sm text-amber-700 mb-2">换电脑或新浏览器时，先导入之前的报表数据作为打底，再录入今日数据。</p>
      <div class="flex gap-2 flex-wrap">
        <label class="btn-sec cursor-pointer">
          📂 导入 JSON 备份
          <input type="file" accept=".json" class="hidden" onchange="importJSON(event)">
        </label>
        <label class="btn-sec cursor-pointer">
          📂 导入 CSV 报表
          <input type="file" accept=".csv" class="hidden" onchange="importCSV(event)">
        </label>
        <button class="btn-sec" onclick="resetToDefault()">↩ 恢复示例数据</button>
        <button class="btn-sec text-red-600" onclick="clearAllData()">🗑 清空全部数据</button>
      </div>
      <p id="import-status" class="text-sm mt-2 hidden"></p>
    </div>
    <div class="space-y-4" id="history-cards"></div>
  </section>

  <!-- Input -->
  <section id="page-input" class="hidden">
    <div class="flex justify-between items-center mb-3">
      <h2 class="text-lg font-bold">录入今日数据</h2>
      <span class="badge" id="today-badge"></span>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="input-cards"></div>
    <div class="mt-4 text-center">
      <button class="btn" onclick="saveToday()">💾 保存并生成报表</button>
      <button class="btn-sec ml-2" onclick="previewToday()">👁 预览</button>
    </div>
    <div id="preview-area" class="mt-4 hidden card"></div>
  </section>

  <!-- Coeff -->
  <section id="page-coeff" class="hidden">
    <h2 class="text-lg font-bold mb-3">系数设置</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="coeff-cards"></div>
    <div class="mt-4">
      <button class="btn" onclick="saveCoeff()">💾 保存为默认系数</button>
      <button class="btn-sec ml-2" onclick="resetCoeff()">↩ 恢复初始</button>
    </div>
  </section>

  <!-- Chart -->
  <section id="page-chart" class="hidden">
    <h2 class="text-lg font-bold mb-3">趋势分析</h2>
    <div id="chart-area" class="space-y-6"></div>
  </section>

  <!-- Daily Report -->
  <section id="page-daily" class="hidden">
    <div class="flex justify-between items-center mb-3">
      <h2 class="text-lg font-bold">📰 油井日报</h2>
      <div class="flex gap-2 items-center">
        <label class="text-sm text-gray-600">选择日期：</label>
        <input type="date" id="daily-date" class="input" style="width:auto;display:inline-block;" onchange="renderDaily()">
        <button class="btn" onclick="exportDailyPDF()">📄 导出 PDF</button>
        <button class="btn-sec" onclick="exportDailyPNG()">🖼️ 导出图片</button>
      </div>
    </div>
    <div id="daily-report-area" class="card" style="background:#fff;">
      <!-- 日报内容动态生成 -->
    </div>
  </section>

</div>

<script>
// ===================== 默认数据 =====================
const DEFAULT_DATA = {
  "渤页平5": [
    {"day":1,"date":"2026-06-15","pressure":9.03,"temp":22.05,"water_ratio":61.53,"gas_meter_2":32415054,"liquid":24.38,"oil":9.39,"water":14.99,"gas":18580,"cum_oil":35963.09,"cum_water":86182.56,"cum_gas":34449265},

    {"day":3,"date":"2026-06-17","pressure":6.16,"temp":22,"water_ratio":60.23,"gas_meter_2":32452120,"liquid":16.63,"oil":6.61,"water":10.02,"gas":18486,"cum_oil":35976.0,"cum_water":86202.97,"cum_gas":34476703},

    {"day":3,"date":"2026-06-17","pressure":1.08,"temp":18,"water_ratio":60.88,"liquid":1.4,"oil":0.55,"water":0.85,"gas":435,"cum_oil":6531.56,"cum_water":23101.13,"cum_gas":7456745},

    {"day":5,"date":"2026-06-20","pressure":1.95,"temp":18,"water_ratio":60.88,"liquid":2.67,"oil":1.04,"water":1.63,"gas":786,"cum_oil":6533.41,"cum_water":23104.03,"cum_gas":7458176}
  ],
  "义页1-2HF": [
    {"day":1,"date":"2026-06-15","pressure":9.85,"temp":28.3,"water_ratio":85.83,"liquid":23.64,"oil":3.35,"water":20.29,"gas":18222,"cum_oil":10409.68,"cum_water":56833.53,"cum_gas":33373681},
    {"day":2,"date":"2026-06-16","pressure":9.86,"temp":28,"water_ratio":85.83,"liquid":23.66,"oil":3.35,"water":20.31,"gas":18241,"cum_oil":10413.03,"cum_water":56853.84,"cum_gas":33391922},
    {"day":3,"date":"2026-06-17","pressure":9.87,"temp":28,"water_ratio":85.86,"liquid":23.69,"oil":3.35,"water":20.34,"gas":18260,"cum_oil":10416.38,"cum_water":56874.18,"cum_gas":33410182},
    {"day":4,"date":"2026-06-18","pressure":9.87,"temp":28,"water_ratio":85.86,"liquid":23.69,"oil":3.35,"water":20.34,"gas":18260,"cum_oil":10419.73,"cum_water":56894.52,"cum_gas":33428443},
    {"day":5,"date":"2026-06-20","pressure":9.84,"temp":28.23,"water_ratio":85.86,"liquid":23.62,"oil":3.34,"water":20.28,"gas":18204,"cum_oil":10423.07,"cum_water":56914.80,"cum_gas":33446647}
  ]
};

const DEFAULT_COEFF = {
  "渤页平5": { liquid: 2.7, gas_type: "diff", gas_factor: 0 },
  "义页1-1VF": { liquid: 1.37, gas_type: "multiply", gas_factor: 403 },
  "义页1-2HF": { liquid: 2.4, gas_type: "multiply", gas_factor: 1850 }
};

const WELLS = ["渤页平5", "义页1-1VF", "义页1-2HF"];
const TODAY_DATE = new Date().toISOString().split('T')[0];

// ===================== Storage =====================
function getData() {
  try { return JSON.parse(localStorage.getItem('oil_data')) || JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  catch (e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function setData(d) { localStorage.setItem('oil_data', JSON.stringify(d)); }

function getCoeff() {
  try { return JSON.parse(localStorage.getItem('oil_coeff')) || JSON.parse(JSON.stringify(DEFAULT_COEFF)); }
  catch (e) { return JSON.parse(JSON.stringify(DEFAULT_COEFF)); }
}
function setCoeff(c) { localStorage.setItem('oil_coeff', JSON.stringify(c)); }

// ===================== Utils =====================
function round2(n) { return Math.round(n * 100) / 100; }
function round0(n) { return Math.round(n); }

function addDays(dateStr, days) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function calcToday(well, pressure, temp, waterRatio, gasMeter2, prev) {
  const c = getCoeff()[well];
  const liquid = round2(pressure * c.liquid);
  let gas = 0;
  if (c.gas_type === 'diff') {
    if (prev && gasMeter2) gas = gasMeter2 - prev.gas_meter_2;
  } else {
    gas = round0(pressure * c.gas_factor);
  }
  const water = round2(liquid * waterRatio / 100);
  const oil = round2(liquid - water);
  const cum_oil = prev ? round2(prev.cum_oil + oil) : oil;
  const cum_water = prev ? round2(prev.cum_water + water) : water;
  const cum_gas = prev ? round0(prev.cum_gas + gas) : gas;
  return { pressure, temp, water_ratio: waterRatio, gas_meter_2: gasMeter2, liquid, oil, water, gas, cum_oil, cum_water, cum_gas };
}

// ===================== Tabs =====================
function switchTab(id) {
  ['history','input','coeff','chart','daily'].forEach(t => {
    document.getElementById('page-' + t).classList.add('hidden');
    document.getElementById('tab-' + t).classList.remove('tab-active');
    document.getElementById('tab-' + t).classList.add('tab-inactive');
  });
  document.getElementById('page-' + id).classList.remove('hidden');
  document.getElementById('tab-' + id).classList.add('tab-active');
  document.getElementById('tab-' + id).classList.remove('tab-inactive');
  if (id === 'history') renderHistory();
  if (id === 'input') renderInput();
  if (id === 'coeff') renderCoeff();
  if (id === 'chart') renderChart();
  if (id === 'daily') renderDaily();
}

// ===================== History =====================
function renderHistory() {
  const data = getData();
  const container = document.getElementById('history-cards');
  container.innerHTML = '';
  WELLS.forEach(well => {
    const rows = data[well] || [];
    const html = `<div class="card">
      <h3 class="font-bold text-gray-800 mb-2">🔹 ${well}</h3>
      <div class="overflow-x-auto">
      <table>
        <thead>
          <tr>
            <th>天数</th><th>日期</th><th>压力(MPa)</th><th>液量(t)</th>
            <th>油量(t)</th><th>水量(t)</th><th>含水(%)</th>
            <th>气量(m³)</th><th>累计油(t)</th><th>累计水(t)</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `<tr>
            <td>${r.day}</td>
            <td>${r.date}</td>
            <td>${r.pressure}</td>
            <td>${r.liquid}</td>
            <td class="success">${r.oil}</td>
            <td>${r.water}</td>
            <td>${r.water_ratio}</td>
            <td>${r.gas}</td>
            <td class="info">${r.cum_oil}</td>
            <td>${r.cum_water}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      </div>
      <div class="mt-2 flex gap-2">
        <button class="btn-sec" onclick="exportWellCSV('${well}')">📥 导出CSV</button>
      </div>
    </div>`;
    container.innerHTML += html;
  });
}

function exportWellCSV(well) {
  const data = getData();
  const rows = data[well] || [];
  if (!rows.length) return;
  const headers = ['天数','日期','压力(MPa)','出液温度(℃)','液量(t)','油量(t)','水量(t)','含水(%)','气量(m³)','累计油(t)','累计水(t)','累计气(m³)'];
  const lines = [headers.join(',')];
  rows.forEach(r => {
    lines.push([r.day, r.date, r.pressure, r.temp, r.liquid, r.oil, r.water, r.water_ratio, r.gas, r.cum_oil, r.cum_water, r.cum_gas].join(','));
  });
  downloadCSV(lines.join('\n'), `oil_report_${well}_${TODAY_DATE}.csv`);
}

function exportHistoryCSV() {
  const data = getData();
  const headers = ['井号','天数','日期','压力(MPa)','出液温度(℃)','液量(t)','油量(t)','水量(t)','含水(%)','气量(m³)','累计油(t)','累计水(t)','累计气(m³)'];
  const lines = [headers.join(',')];
  WELLS.forEach(well => {
    (data[well] || []).forEach(r => {
      lines.push([well, r.day, r.date, r.pressure, r.temp, r.liquid, r.oil, r.water, r.water_ratio, r.gas, r.cum_oil, r.cum_water, r.cum_gas].join(','));
    });
  });
  downloadCSV(lines.join('\n'), `oil_report_all_${TODAY_DATE}.csv`);
}

function downloadCSV(content, filename) {
  const blob = new Blob(["\uFEFF" + content], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}

// ===================== Input =====================
let previewRecords = {};

function renderInput() {
  const data = getData();
  const container = document.getElementById('input-cards');
  container.innerHTML = '';
  previewRecords = {};
  const coeff = getCoeff();

  WELLS.forEach(well => {
    const prev = data[well] && data[well].length ? data[well][data[well].length - 1] : null;
    const nextDay = prev ? prev.day + 1 : 1;
    const defaultDate = prev ? addDays(prev.date, 1) : TODAY_DATE;
    const defaults = {
      "渤页平5": { temp: 22, water: 60.23 },
      "义页1-1VF": { temp: 18, water: 60.88 },
      "义页1-2HF": { temp: 28, water: 85.83 }
    };
    const df = defaults[well];
    const c = coeff[well];
    const formula = `液量 = 压力 × ${c.liquid}` + (c.gas_type === 'diff' ? ' / 气量 = 气表差' : ` / 气量 = 压力 × ${c.gas_factor}`);

    const html = `<div class="card">
      <h3 class="font-bold text-gray-800 mb-2">${well}</h3>
      <p class="text-xs text-gray-500 mb-2">${formula}</p>
      <label class="block text-sm text-gray-600 mb-1">天数</label>
      <input id="inp_day_${well}" class="input mb-2" type="number" value="${nextDay}" min="1">
      <label class="block text-sm text-gray-600 mb-1">日期</label>
      <input id="inp_date_${well}" class="input mb-2" type="date" value="${defaultDate}">
      <label class="block text-sm text-gray-600 mb-1">井口压力 (MPa)</label>
      <input id="inp_pressure_${well}" class="input mb-2" type="number" step="0.01" value="" oninput="calcInput('${well}')">
      <label class="block text-sm text-gray-600 mb-1">出液温度 (°C)</label>
      <input id="inp_temp_${well}" class="input mb-2" type="number" step="0.1" value="${df.temp}">
      <label class="block text-sm text-gray-600 mb-1">综合含水 (%)</label>
      <input id="inp_water_${well}" class="input mb-2" type="number" step="0.01" value="${df.water}" oninput="calcInput('${well}')">
      ${well === '渤页平5' ? `<label class="block text-sm text-gray-600 mb-1">气表2累计读数</label><input id="inp_gas_${well}" class="input mb-2" type="number" step="1" value="" oninput="calcInput('${well}')">` : ''}
      <div id="result_${well}" class="mt-2 p-2 bg-blue-50 rounded text-sm hidden">
        <div>液量: <span class="info" id="res_liquid_${well}">--</span> t</div>
        <div>产油: <span class="success" id="res_oil_${well}">--</span> t</div>
        <div>产水: <span id="res_water_${well}">--</span> t</div>
        <div>气量: <span id="res_gas_${well}">--</span> m³</div>
        <div class="mt-1 text-xs text-gray-500">累计油: <span id="res_cumo_${well}">--</span> t</div>
      </div>
    </div>`;
    container.innerHTML += html;
  });
  document.getElementById('today-badge').textContent = '今天是 ' + TODAY_DATE;
}

function calcInput(well) {
  const data = getData();
  const prev = data[well] && data[well].length ? data[well][data[well].length - 1] : null;
  const pressure = parseFloat(document.getElementById('inp_pressure_' + well).value) || 0;
  const temp = parseFloat(document.getElementById('inp_temp_' + well).value) || 0;
  const waterRatio = parseFloat(document.getElementById('inp_water_' + well).value) || 0;
  let gasMeter2 = null;
  if (well === '渤页平5') {
    gasMeter2 = parseFloat(document.getElementById('inp_gas_' + well).value) || 0;
  }
  if (!pressure) {
    document.getElementById('result_' + well).classList.add('hidden');
    return;
  }
  const res = calcToday(well, pressure, temp, waterRatio, gasMeter2, prev);
  previewRecords[well] = res;
  document.getElementById('result_' + well).classList.remove('hidden');
  document.getElementById('res_liquid_' + well).textContent = res.liquid;
  document.getElementById('res_oil_' + well).textContent = res.oil;
  document.getElementById('res_water_' + well).textContent = res.water;
  document.getElementById('res_gas_' + well).textContent = res.gas;
  document.getElementById('res_cumo_' + well).textContent = res.cum_oil;
}

function previewToday() {
  const area = document.getElementById('preview-area');
  if (!Object.keys(previewRecords).length) { area.classList.add('hidden'); return; }
  let html = '<h3 class="font-bold mb-2">今日报表预览</h3><table><thead><tr><th>井号</th><th>压力</th><th>液量</th><th>油量</th><th>水量</th><th>含水%</th><th>气量</th><th>累计油</th></tr></thead><tbody>';
  WELLS.forEach(well => {
    const r = previewRecords[well];
    if (!r) return;
    html += `<tr><td class="font-bold">${well}</td><td>${r.pressure}</td><td>${r.liquid}</td><td class="success">${r.oil}</td><td>${r.water}</td><td>${r.water_ratio}</td><td>${r.gas}</td><td class="info">${r.cum_oil}</td></tr>`;
  });
  html += '</tbody></table>';
  html += `<button class="btn mt-2" onclick="downloadPreviewCSV()">📥 下载今日CSV</button>`;
  area.innerHTML = html;
  area.classList.remove('hidden');
}

function downloadPreviewCSV() {
  if (!Object.keys(previewRecords).length) return;
  const headers = ['井号','天数','日期','压力(MPa)','出液温度(℃)','液量(t)','油量(t)','水量(t)','含水(%)','气量(m³)','累计油(t)','累计水(t)','累计气(m³)'];
  const lines = [headers.join(',')];
  WELLS.forEach(well => {
    const r = previewRecords[well]; if (!r) return;
    const day = document.getElementById('inp_day_' + well).value;
    const date = document.getElementById('inp_date_' + well).value;
    lines.push([well, day, date, r.pressure, r.temp, r.liquid, r.oil, r.water, r.water_ratio, r.gas, r.cum_oil, r.cum_water, r.cum_gas].join(','));
  });
  downloadCSV(lines.join('\n'), `oil_report_today_${TODAY_DATE}.csv`);
}

function saveToday() {
  const data = getData();
  let saved = false;
  WELLS.forEach(well => {
    const pressure = parseFloat(document.getElementById('inp_pressure_' + well).value) || 0;
    if (!pressure) return;
    const day = parseInt(document.getElementById('inp_day_' + well).value) || 1;
    const date = document.getElementById('inp_date_' + well).value;
    const temp = parseFloat(document.getElementById('inp_temp_' + well).value) || 0;
    const waterRatio = parseFloat(document.getElementById('inp_water_' + well).value) || 0;
    let gasMeter2 = null;
    if (well === '渤页平5') {
      gasMeter2 = parseFloat(document.getElementById('inp_gas_' + well).value) || 0;
    }
    const prev = data[well] && data[well].length ? data[well][data[well].length - 1] : null;
    const res = calcToday(well, pressure, temp, waterRatio, gasMeter2, prev);
    const record = { day, date, ...res };
    if (!data[well]) data[well] = [];
    data[well].push(record);
    saved = true;
  });
  if (saved) {
    setData(data);
    alert('✅ 保存成功！');
    previewRecords = {};
    document.getElementById('preview-area').classList.add('hidden');
    renderInput();
  } else {
    alert('请先输入井口压力');
  }
}

    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: '日产油(t)', data: rows.map(r => r.oil), borderColor: '#16a34a', tension: 0.1, fill: false },
        { label: '日产液(t)', data: rows.map(r => r.liquid), borderColor: '#2563eb', tension: 0.1, fill: false },
        { label: '日产水(t)', data: rows.map(r => r.water), borderColor: '#d97706', tension: 0.1, fill: false }

    options: {
      responsive: true,

function exportJSON() {

    data: data
  };

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);
      if (backup.data) {
        setData(backup.data);
        if (backup.coeff) setCoeff(backup.coeff);
        renderHistory();
        showImportStatus(`✅ JSON导入成功！`, 'green');
      } else {
        showImportStatus('❌ JSON格式错误：缺少 data 字段', 'red');
      }
    } catch (err) {
      showImportStatus('❌ JSON解析失败：' + err.message, 'red');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text = e.target.result;
      const lines = text.split('\n').filter(l => l.trim());
      if (lines.length < 2) {
        showImportStatus('❌ CSV 数据行不足', 'red');
        return;
      }
      // 解析 CSV
      const newData = { "渤页平5": [], "义页1-1VF": [], "义页1-2HF": [] };
      for (let i = 1; i < lines.length; i++) {
        const parts = lines[i].split(',');
        if (parts.length < 12) continue;
        const well = parts[0].trim();
        if (!newData[well]) continue;
        newData[well].push({
          day: parseInt(parts[1]) || 0,
          date: parts[2].trim(),
          pressure: parseFloat(parts[3]) || 0,
          temp: parseFloat(parts[4]) || 0,
          liquid: parseFloat(parts[5]) || 0,
          oil: parseFloat(parts[6]) || 0,
          water: parseFloat(parts[7]) || 0,
          water_ratio: parseFloat(parts[8]) || 0,
          gas: parseInt(parts[9]) || 0,
          cum_oil: parseFloat(parts[10]) || 0,
          cum_water: parseFloat(parts[11]) || 0,
          cum_gas: parseInt(parts[12]) || 0
        });
      }
      // 合并到现有数据（去重按 day+date）
      const current = getData();
      WELLS.forEach(well => {
        if (!current[well]) current[well] = [];
        const existingKeys = new Set(current[well].map(r => r.day + '_' + r.date));
        (newData[well] || []).forEach(r => {
          if (!existingKeys.has(r.day + '_' + r.date)) {
            current[well].push(r);
          }
        });
        // 按 day 排序
        current[well].sort((a, b) => a.day - b.day);
      });
      setData(current);
      renderHistory();
      showImportStatus('✅ CSV导入成功！已合并去重', 'green');
    } catch (err) {
      showImportStatus('❌ CSV解析失败：' + err.message, 'red');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}


// ===================== Daily Report =====================
function renderDaily() {
  const data = getData();
  const dateInput = document.getElementById('daily-date');
  
  // 如果没有选择日期，默认最新一天
  if (!dateInput.value) {
    let latestDate = '';
    WELLS.forEach(w => {
      if (data[w] && data[w].length) {
        const d = data[w][data[w].length - 1].date;
        if (d > latestDate) latestDate = d;
      }
    });
    dateInput.value = latestDate || TODAY_DATE;
  }
  
  const selectedDate = dateInput.value;
  const container = document.getElementById('daily-report-area');
  
  // 收集各井该日数据
  const dailyData = {};
  const prevData = {};
  WELLS.forEach(well => {
    const rows = data[well] || [];
    const idx = rows.findIndex(r => r.date === selectedDate);
    if (idx >= 0) {
      dailyData[well] = rows[idx];
      prevData[well] = idx > 0 ? rows[idx - 1] : null;
    }
  });
  
  if (!Object.keys(dailyData).length) {
    container.innerHTML = `<div class="text-center p-8 text-gray-500">
      <p class="text-lg">📭 该日期暂无数据</p>
      <p class="text-sm mt-2">请先在"录入今日数据"页面添加数据，或选择其他日期。</p>
    </div>`;
    return;
  }
  
  // 环比计算函数
  function calcChange(curr, prev, key) {
    if (!prev || !curr) return { val: 0, pct: 0, icon: '−', cls: 'text-gray-400' };
    const diff = round2(curr[key] - prev[key]);
    const pct = prev[key] ? round2(diff / prev[key] * 100) : 0;
    const up = diff > 0;
    const icon = diff > 0 ? '↑' : (diff < 0 ? '↓' : '−');
    // 油：上升绿色，下降红色；水：上升红色，下降绿色
    let cls = 'text-gray-400';
    if (key === 'oil') {
      cls = up ? 'success' : (diff < 0 ? 'danger' : 'text-gray-400');
    } else if (key === 'water') {
      cls = up ? 'danger' : (diff < 0 ? 'success' : 'text-gray-400');
    } else if (key === 'pressure') {
      cls = up ? 'info' : (diff < 0 ? 'warn' : 'text-gray-400');
    } else {
      cls = up ? 'info' : (diff < 0 ? 'warn' : 'text-gray-400');
    }
    return { val: diff, pct: pct, icon: icon, cls: cls };
  }
  
  // 汇总对比表
  let summaryHtml = `<div class="mb-6">
    <h3 class="font-bold text-gray-800 mb-3 text-lg">📊 今日汇总对比（${selectedDate}）</h3>
    <div class="overflow-x-auto">
    <table class="border border-gray-200">
      <thead>
        <tr>
          <th class="text-center">指标</th>
          ${WELLS.map(w => `<th class="text-center">${w}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        <tr><td class="font-semibold">井口压力 (MPa)</td>${WELLS.map(w => {
          const r = dailyData[w]; const p = prevData[w];
          const c = calcChange(r, p, 'pressure');
          return `<td class="text-center">${r?r.pressure:'−'} <span class="${c.cls} text-xs">${c.icon}${Math.abs(c.val)} (${c.icon}${Math.abs(c.pct)}%)</span></td>`;
        }).join('')}</tr>
        <tr><td class="font-semibold">日产液 (t)</td>${WELLS.map(w => {
          const r = dailyData[w]; const p = prevData[w];
          const c = calcChange(r, p, 'liquid');
          return `<td class="text-center">${r?r.liquid:'−'} <span class="${c.cls} text-xs">${c.icon}${Math.abs(c.val)} (${c.icon}${Math.abs(c.pct)}%)</span></td>`;
        }).join('')}</tr>
        <tr><td class="font-semibold text-green-700">日产油 (t)</td>${WELLS.map(w => {
          const r = dailyData[w]; const p = prevData[w];
          const c = calcChange(r, p, 'oil');
          return `<td class="text-center font-bold success">${r?r.oil:'−'} <span class="${c.cls} text-xs">${c.icon}${Math.abs(c.val)} (${c.icon}${Math.abs(c.pct)}%)</span></td>`;
        }).join('')}</tr>
        <tr><td class="font-semibold">日产水 (t)</td>${WELLS.map(w => {
          const r = dailyData[w]; const p = prevData[w];
          const c = calcChange(r, p, 'water');
          return `<td class="text-center">${r?r.water:'−'} <span class="${c.cls} text-xs">${c.icon}${Math.abs(c.val)} (${c.icon}${Math.abs(c.pct)}%)</span></td>`;
        }).join('')}</tr>
        <tr><td class="font-semibold">含水 (%)</td>${WELLS.map(w => `<td class="text-center">${dailyData[w]?dailyData[w].water_ratio:'−'}</td>`).join('')}</tr>
        <tr><td class="font-semibold">气量 (m³)</td>${WELLS.map(w => {
          const r = dailyData[w]; const p = prevData[w];
          const c = calcChange(r, p, 'gas');
          return `<td class="text-center">${r?r.gas:'−'} <span class="${c.cls} text-xs">${c.icon}${Math.abs(c.val)}</span></td>`;
        }).join('')}</tr>
        <tr><td class="font-semibold">累计油 (t)</td>${WELLS.map(w => `<td class="text-center info">${dailyData[w]?dailyData[w].cum_oil:'−'}</td>`).join('')}</tr>
      </tbody>
    </table>
    </div>
  </div>`;
  
  // 单井详情 + 趋势图
  let detailHtml = `<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">`;
  WELLS.forEach(well => {
    const r = dailyData[well];
    if (!r) return;
    const p = prevData[well];
    const co = calcChange(r, p, 'oil');
    const cl = calcChange(r, p, 'liquid');
    const cw = calcChange(r, p, 'water');
    const cpr = calcChange(r, p, 'pressure');
    
    // 取近7天数据
    const allRows = data[well] || [];
    const idx = allRows.findIndex(row => row.date === selectedDate);
    const recent7 = idx >= 0 ? allRows.slice(Math.max(0, idx - 6), idx + 1) : allRows.slice(-7);
    
    detailHtml += `<div class="card border-blue-100">
      <h4 class="font-bold text-gray-800 mb-2 border-b pb-1">🔹 ${well}</h4>
      <div class="space-y-1 text-sm">
        <div class="flex justify-between"><span class="text-gray-600">井口压力</span><span class="font-semibold">${r.pressure} MPa <span class="${cpr.cls} text-xs">${cpr.icon}${Math.abs(cpr.val)}</span></span></div>
        <div class="flex justify-between"><span class="text-gray-600">出液温度</span><span class="font-semibold">${r.temp} ℃</span></div>
        <div class="flex justify-between"><span class="text-gray-600">日产液</span><span class="font-semibold">${r.liquid} t <span class="${cl.cls} text-xs">${cl.icon}${Math.abs(cl.val)}</span></span></div>
        <div class="flex justify-between"><span class="text-gray-600 text-green-700">日产油</span><span class="font-bold success">${r.oil} t <span class="${co.cls} text-xs">${co.icon}${Math.abs(co.val)} (${co.icon}${Math.abs(co.pct)}%)</span></span></div>
        <div class="flex justify-between"><span class="text-gray-600">日产水</span><span class="font-semibold">${r.water} t <span class="${cw.cls} text-xs">${cw.icon}${Math.abs(cw.val)}</span></span></div>
        <div class="flex justify-between"><span class="text-gray-600">含水率</span><span class="font-semibold">${r.water_ratio}%</span></div>
        <div class="flex justify-between"><span class="text-gray-600">气量</span><span class="font-semibold">${r.gas} m³</span></div>
        <div class="flex justify-between"><span class="text-gray-600">累计油</span><span class="font-semibold info">${r.cum_oil} t</span></div>
        <div class="flex justify-between"><span class="text-gray-600">累计水</span><span class="font-semibold">${r.cum_water} t</span></div>
        <div class="flex justify-between"><span class="text-gray-600">累计气</span><span class="font-semibold">${r.cum_gas} m³</span></div>
      </div>
      <div class="mt-3" style="height:120px">
        <canvas id="daily_chart_${well.replace(/[^a-zA-Z0-9]/g, '_')}"></canvas>
      </div>
    </div>`;
    
    // 延迟绘制 mini 图
    setTimeout(() => {
      const ctx = document.getElementById('daily_chart_' + well.replace(/[^a-zA-Z0-9]/g, '_'));
      if (!ctx) return;
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: recent7.map((r, i) => `D${r.day}`),
          datasets: [
            { label: '油(t)', data: recent7.map(r => r.oil), borderColor: '#16a34a', tension: 0.3, pointRadius: 2, borderWidth: 1.5 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { font: { size: 9 } }, grid: { display: false } },
            y: { ticks: { font: { size: 9 } }, grid: { color: '#f3f4f6' } }
          }
        }
      });
    }, 50);
  });
  detailHtml += `</div>`;
  
  // 备注区域
  const noteKey = 'daily_note_' + selectedDate;
  const savedNote = localStorage.getItem(noteKey) || '';
  detailHtml += `<div class="card bg-gray-50 mt-4">
    <h4 class="font-bold text-gray-800 mb-2">📝 日报备注</h4>
    <textarea id="daily-note" class="input" rows="3" placeholder="填写今日生产备注、异常情况、工作安排等..." onblur="saveDailyNote()">${savedNote}</textarea>
    <p class="text-xs text-gray-500 mt-1">备注自动保存，仅保存在本地浏览器。</p>
  </div>`;
  
  container.innerHTML = summaryHtml + detailHtml;
}

  const date = document.getElementById('daily-date').value;
  const note = document.getElementById('daily-note').value;

async function exportDailyPDF() {
  const area = document.getElementById('daily-report-area');
  if (!area || area.innerHTML.includes('暂无数据')) { alert('请先生成日报'); return; }
  
  const { jsPDF } = window.jspdf;
  const canvas = await html2canvas(area, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
  const imgData = canvas.toDataURL('image/png');
  
  const pdf = new jsPDF('p', 'mm', 'a4');
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const imgWidth = pageWidth - 20;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;
  
  let heightLeft = imgHeight;
  let position = 10;
  
  pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
  heightLeft -= (pageHeight - 20);
  
  while (heightLeft > 0) {
    position = heightLeft - imgHeight + 10;
    pdf.addPage();
    pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
    heightLeft -= (pageHeight - 20);
  }
  
  pdf.save(`oil_daily_report_${document.getElementById('daily-date').value}.pdf`);
}
