<!-- 油井报表管理系统前端 - 响应式HTML -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>油井报表管理系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  body { font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
  .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
  .tab-inactive { color: #6b7280; }
  .tab-inactive:hover { color: #374151; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 1rem; }
  .input { border: 1px solid #d1d5db; border-radius: 0.375rem; padding: 0.5rem; width: 100%; font-size: 0.875rem; }
  .input:focus { outline: none; border-color: #2563eb; }
  .btn { background: #2563eb; color: #fff; border: none; border-radius: 0.375rem; padding: 0.5rem 1rem; cursor: pointer; font-size: 0.875rem; }
  .btn:hover { background: #1d4ed8; }
  .btn-sec { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; border-radius: 0.375rem; padding: 0.5rem 1rem; cursor: pointer; font-size: 0.875rem; }
  .btn-sec:hover { background: #e5e7eb; }
  .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
  .btn-red { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
  .btn-red:hover { background: #fecaca; }
  .badge { background: #dbeafe; color: #1e40af; font-size: 0.75rem; padding: 0.125rem 0.5rem; border-radius: 0.25rem; }
  .success { color: #16a34a; font-weight: 600; }
  .info { color: #2563eb; font-weight: 600; }
  .warn { color: #d97706; font-weight: 600; }
  .danger { color: #dc2626; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  th { background: #f9fafb; padding: 0.5rem; text-align: left; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
  td { padding: 0.5rem; border-bottom: 1px solid #f3f4f6; }
  tr:hover td { background: #fafafa; }
  .hidden { display: none; }
  .gap-row td { background: #fef2f2 !important; }
  .input-edit { padding: 0.25rem 0.5rem; font-size: 0.875rem; width: 80px; border: 1px solid #2563eb; border-radius: 0.25rem; }
  .input-edit:focus { outline: none; background: #eff6ff; }
  .well-tag { display: inline-flex; align-items: center; gap: 0.5rem; background: #dbeafe; color: #1e40af; padding: 0.25rem 0.75rem; border-radius: 0.375rem; font-size: 0.875rem; font-weight: 500; }
  .well-tag .del { cursor: pointer; font-size: 1rem; line-height: 1; }
  .well-tag .del:hover { color: #dc2626; }
  /* 手机端适配 */
  @media (max-width: 768px) {
    body { font-size: 14px; }
    .max-w-6xl { max-width: 100%; padding: 0.5rem; }
    h1 { font-size: 1.25rem; }
    h2 { font-size: 1.1rem; }
    h3 { font-size: 1rem; }
    .card { padding: 0.75rem; }
    .btn { padding: 0.5rem 0.75rem; font-size: 0.875rem; }
    .btn-sm { padding: 0.25rem 0.375rem; font-size: 0.75rem; }
    .input { padding: 0.375rem; font-size: 0.875rem; }
    .input-edit { width: 60px; padding: 0.125rem 0.25rem; font-size: 0.75rem; }
    table { font-size: 0.75rem; }
    th, td { padding: 0.375rem 0.25rem; }
    .overflow-x-auto { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  }
  /* 更小的手机 */
  @media (max-width: 480px) {
    .max-w-6xl { padding: 0.25rem; }
    .btn { padding: 0.375rem 0.5rem; font-size: 0.75rem; }
    table { font-size: 0.7rem; }
    th, td { padding: 0.25rem; white-space: nowrap; }
  }
</style>
</head>
<body class="bg-gray-50 text-gray-800">
<div class="max-w-6xl mx-auto p-4">
  <header class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">🛢️ 油井报表管理系统</h1>
    <p class="text-sm text-gray-500" id="header-wells">管理油井数据</p>
  </header>

  <!-- Tabs -->
  <nav class="flex space-x-6 mb-4 border-b border-gray-200 flex-wrap gap-y-2">
    <button onclick="switchTab('history')" id="tab-history" class="tab-active pb-2">📋 历史报表</button>
    <button onclick="switchTab('input')" id="tab-input" class="tab-inactive pb-2">📝 录入今日数据</button>
    <button onclick="switchTab('coeff')" id="tab-coeff" class="tab-inactive pb-2">⚙️ 系数设置</button>
    <button onclick="switchTab('chart')" id="tab-chart" class="tab-inactive pb-2">📈 趋势分析</button>
    <button onclick="switchTab('daily')" id="tab-daily" class="tab-inactive pb-2">📰 日报生成</button>
    <button onclick="switchTab('wells')" id="tab-wells" class="tab-inactive pb-2">🏗️ 井名管理</button>
  </nav>

  <!-- History -->
  <section id="page-history">
    <div class="flex justify-between items-center mb-3">
      <h2 class="text-lg font-bold">历史报表</h2>
      <div class="flex gap-2">
        <button class="btn-sec" onclick="exportHistoryCSV()">📥 导出CSV</button>
        <button class="btn-sec" onclick="exportJSON()">💾 备份JSON</button>
      </div>
    </div>
    <!-- 数据导入区 -->
    <div class="card mb-4 bg-amber-50 border-amber-200">
      <h3 class="font-bold text-amber-800 mb-2">🔄 数据导入</h3>
      <p class="text-sm text-amber-700 mb-2">换电脑或新设备时，导入之前的报表数据。</p>
      <div class="flex gap-2 flex-wrap">
        <label class="btn-sec cursor-pointer">
          📂 导入 JSON 备份
          <input type="file" accept=".json" class="hidden" onchange="importJSON(event)">
        </label>
        <label class="btn-sec cursor-pointer">
          📂 导入 CSV 报表
          <input type="file" accept=".csv" class="hidden" onchange="importCSV(event)">
        </label>
        <button class="btn-sec" onclick="resetToDefault()">↩ 恢复示例数据</button>
        <button class="btn-sec text-red-600" onclick="clearAllData()">🗑 清空全部数据</button>
      </div>
      <p id="import-status" class="text-sm mt-2 hidden"></p>
    </div>
    <div class="space-y-4" id="history-cards"></div>
  </section>

  <!-- Input -->
  <section id="page-input" class="hidden">
    <div class="flex justify-between items-center mb-3">
      <h2 class="text-lg font-bold">录入今日数据</h2>
      <span class="badge" id="today-badge"></span>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="input-cards"></div>
    <div class="mt-4 text-center">
      <button class="btn" onclick="saveToday()">💾 保存并生成报表</button>
      <button class="btn-sec ml-2" onclick="previewToday()">👁 预览</button>
    </div>
    <div id="preview-area" class="mt-4 hidden card"></div>
  </section>

  <!-- Coeff -->
  <section id="page-coeff" class="hidden">
    <h2 class="text-lg font-bold mb-3">系数设置</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="coeff-cards"></div>
    <div class="mt-4">
      <button class="btn" onclick="saveCoeff()">💾 保存为默认系数</button>
      <button class="btn-sec ml-2" onclick="resetCoeff()">↩ 恢复初始</button>
    </div>
  </section>

  <!-- Chart -->
  <section id="page-chart" class="hidden">
    <h2 class="text-lg font-bold mb-3">趋势分析</h2>
    <div id="chart-area" class="space-y-6"></div>
  </section>

  <!-- Daily Report -->
  <section id="page-daily" class="hidden">
    <div class="flex justify-between items-center mb-3">
      <h2 class="text-lg font-bold">📰 油井日报</h2>
      <div class="flex gap-2 items-center">
        <label class="text-sm text-gray-600">选择日期：</label>
        <input type="date" id="daily-date" class="input" style="width:auto;display:inline-block;" onchange="renderDaily()">
        <button class="btn" onclick="exportDailyPDF()">📄 导出 PDF</button>
        <button class="btn-sec" onclick="exportDailyPNG()">🖼️ 导出图片</button>
      </div>
    </div>
    <div id="daily-report-area" class="card" style="background:#fff;"></div>
  </section>

  <!-- Well Management -->
  <section id="page-wells" class="hidden">
    <h2 class="text-lg font-bold mb-3">🏗️ 井名管理</h2>
    <div class="card mb-4">
      <h3 class="font-bold mb-2">添加新井</h3>
      <div class="flex gap-2">
        <input id="new-well-name" class="input" style="max-width:300px" placeholder="输入井名（如：渤页平6）">
        <button class="btn" onclick="addWell()">➕ 添加</button>
      </div>
    </div>
    <div class="card">
      <h3 class="font-bold mb-2">现有油井</h3>
      <div id="wells-list" class="flex flex-wrap gap-2"></div>
    </div>
  </section>

</div>

<script>
// ===================== 默认数据 =====================
const DEFAULT_DATA = {"渤页平5": [{"day": 1, "date": "2026-06-15", "pressure": 9.03, "temp": 22.05, "water_ratio": 61.53, "gas_meter_2": 32415054, "liquid": 24.38, "oil": 9.39, "water": 14.99, "gas": 18580, "cum_oil": 35963.09, "cum_water": 86182.56, "cum_gas": 34449265}, {"day": 2, "date": "2026-06-16", "pressure": 5.91, "temp": 22.05, "water_ratio": 60.23, "gas_meter_2": 32433634, "liquid": 15.96, "oil": 6.35, "water": 9.61, "gas": 18580, "cum_oil": 35969.39, "cum_water": 86192.95, "cum_gas": 34467875}, {"day": 3, "date": "2026-06-17", "pressure": 6.16, "temp": 22, "water_ratio": 60.23, "gas_meter_2": 32452120, "liquid": 16.63, "oil": 6.61, "water": 10.02, "gas": 18486, "cum_oil": 35976.0, "cum_water": 86202.97, "cum_gas": 34476703}, {"day": 4, "date": "2026-06-18", "pressure": 5.88, "temp": 22, "water_ratio": 60.19, "gas_meter_2": 32470796, "liquid": 15.88, "oil": 6.32, "water": 9.56, "gas": 18676, "cum_oil": 35982.32, "cum_water": 86212.53, "cum_gas": 34485899}, {"day": 5, "date": "2026-06-20", "pressure": 5.97, "temp": 22.43, "water_ratio": 60.23, "gas_meter_2": 32486600, "liquid": 16.12, "oil": 6.41, "water": 9.71, "gas": 15804, "cum_oil": 35988.73, "cum_water": 86222.24, "cum_gas": 34501703}], "义页1-1VF": [{"day": 1, "date": "2026-06-15", "pressure": 0.91, "temp": 18, "water_ratio": 61.0, "gas_meter_2": 0, "liquid": 1.0, "oil": 0.39, "water": 0.61, "gas": 295, "cum_oil": 6530.2, "cum_water": 23099.01, "cum_gas": 7455665}, {"day": 2, "date": "2026-06-16", "pressure": 1.0, "temp": 18, "water_ratio": 60.88, "gas_meter_2": 0, "liquid": 1.3, "oil": 0.51, "water": 0.79, "gas": 403, "cum_oil": 6530.75, "cum_water": 23099.86, "cum_gas": 7456100}, {"day": 3, "date": "2026-06-17", "pressure": 1.08, "temp": 18, "water_ratio": 60.88, "gas_meter_2": 0, "liquid": 1.4, "oil": 0.55, "water": 0.85, "gas": 435, "cum_oil": 6531.56, "cum_water": 23101.13, "cum_gas": 7456745}, {"day": 4, "date": "2026-06-18", "pressure": 1.6, "temp": 18, "water_ratio": 61.01, "gas_meter_2": 0, "liquid": 1.4, "oil": 0.55, "water": 0.85, "gas": 435, "cum_oil": 6532.11, "cum_water": 23101.98, "cum_gas": 7457180}], "义页1-2HF": [{"day": 1, "date": "2026-06-15", "pressure": 8.05, "temp": 28, "water_ratio": 85.83, "gas_meter_2": 0, "liquid": 19.32, "oil": 2.73, "water": 16.59, "gas": 15537, "cum_oil": 5285.76, "cum_water": 63183.24, "cum_gas": 12762202}, {"day": 2, "date": "2026-06-16", "pressure": 8.01, "temp": 28, "water_ratio": 85.83, "gas_meter_2": 0, "liquid": 19.22, "oil": 2.72, "water": 16.5, "gas": 15478, "cum_oil": 5288.48, "cum_water": 63199.74, "cum_gas": 12777680}, {"day": 3, "date": "2026-06-17", "pressure": 8.09, "temp": 28, "water_ratio": 85.83, "gas_meter_2": 0, "liquid": 19.42, "oil": 2.75, "water": 16.67, "gas": 15651, "cum_oil": 5291.23, "cum_water": 63216.41, "cum_gas": 12793331}, {"day": 4, "date": "2026-06-18", "pressure": 8.1, "temp": 28, "water_ratio": 85.83, "gas_meter_2": 0, "liquid": 19.44, "oil": 2.75, "water": 16.69, "gas": 15670, "cum_oil": 5293.98, "cum_water": 63233.1, "cum_gas": 12809001}]};
const DEFAULT_COEFF = {"渤页平5": {"liquid": 2.7, "gas_type": "diff", "gas_factor": 0}, "义页1-1VF": {"liquid": 1.37, "gas_type": "multiply", "gas_factor": 403}, "义页1-2HF": {"liquid": 2.4, "gas_type": "multiply", "gas_factor": 1850}};
let WELLS = ["渤页平5", "义页1-1VF", "义页1-2HF"];
const TODAY_DATE = new Date().toISOString().split('T')[0];

// 内存缓存
let _data = {};
let _coeff = {};

// ===================== API 层 =====================
async function initData() {
  try {
    const res = await fetch('/api/data');
    const json = await res.json();
    _data = json.data || {};
    _coeff = json.coeff || {};
    if (json.wells && json.wells.length) {
      WELLS = json.wells;
    } else {
      // 数据库为空，初始化默认数据
      _data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      _coeff = JSON.parse(JSON.stringify(DEFAULT_COEFF));
      WELLS = Object.keys(DEFAULT_DATA);
      await syncData();
    }
  } catch (e) {
    console.error('Failed to load data:', e);
    _data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    _coeff = JSON.parse(JSON.stringify(DEFAULT_COEFF));
  }
}

function getData() { return _data; }
function setData(d) { _data = d; }
function getCoeff() { return _coeff; }
function setCoeff(c) { _coeff = c; }

async function syncData() {
  try {
    await fetch('/api/data', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({wells: WELLS, data: _data, coeff: _coeff})
    });
  } catch (e) {
    console.error('Sync failed:', e);
    showImportStatus('❌ 同步失败: ' + e.message, 'red');
  }
}

async function addWellAPI(name) {
  await fetch('/api/well', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name})
  });
}

async function deleteWellAPI(name) {
  await fetch('/api/well/' + encodeURIComponent(name), {method: 'DELETE'});
}

async function deleteRecordAPI(well, date) {
  await fetch('/api/well/' + encodeURIComponent(well) + '/record/' + date, {method: 'DELETE'});
}

async function getNoteAPI(date) {
  try {
    const res = await fetch('/api/note/' + date);
    const json = await res.json();
    return json.note || '';
  } catch (e) { return ''; }
}

async function saveNoteAPI(date, note) {
  await fetch('/api/note/' + date, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({note})
  });
}

// ===================== Utils =====================
function round2(n) { return Math.round(n * 100) / 100; }
function round0(n) { return Math.round(n); }

function addDays(dateStr, days) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function daysDiff(a, b) {
  const da = new Date(a + 'T00:00:00');
  const db = new Date(b + 'T00:00:00');
  return Math.round((db - da) / (1000 * 60 * 60 * 24));
}

function calcToday(well, pressure, temp, waterRatio, gasMeter2, prev) {
  const c = getCoeff()[well];
  const liquid = round2(pressure * c.liquid);
  let gas = 0;
  if (c.gas_type === 'diff') {
    if (prev && gasMeter2) gas = gasMeter2 - prev.gas_meter_2;
  } else {
    gas = round0(pressure * c.gas_factor);
  }
  const water = round2(liquid * waterRatio / 100);
  const oil = round2(liquid - water);
  const cum_oil = prev ? round2(prev.cum_oil + oil) : oil;
  const cum_water = prev ? round2(prev.cum_water + water) : water;
  const cum_gas = prev ? round0(prev.cum_gas + gas) : gas;
  return { pressure, temp, water_ratio: waterRatio, gas_meter_2: gasMeter2, liquid, oil, water, gas, cum_oil, cum_water, cum_gas };
}

async function recalcAllCumulative(well) {
  const data = getData();
  const rows = data[well] || [];
  if (!rows.length) return;
  rows.sort((a, b) => new Date(a.date) - new Date(b.date));
  let cum_oil = 0, cum_water = 0, cum_gas = 0;
  for (let i = 0; i < rows.length; i++) {
    rows[i].day = i + 1;
    cum_oil = round2(cum_oil + rows[i].oil);
    cum_water = round2(cum_water + rows[i].water);
    cum_gas = round0(cum_gas + rows[i].gas);
    rows[i].cum_oil = cum_oil;
    rows[i].cum_water = cum_water;
    rows[i].cum_gas = cum_gas;
  }
  data[well] = rows;
  setData(data);
  await syncData();
}

// ===================== Tabs =====================
function switchTab(id) {
  ['history','input','coeff','chart','daily','wells'].forEach(t => {
    document.getElementById('page-' + t).classList.add('hidden');
    document.getElementById('tab-' + t).classList.remove('tab-active');
    document.getElementById('tab-' + t).classList.add('tab-inactive');
  });
  document.getElementById('page-' + id).classList.remove('hidden');
  document.getElementById('tab-' + id).classList.add('tab-active');
  document.getElementById('tab-' + id).classList.remove('tab-inactive');
  if (id === 'history') renderHistory();
  if (id === 'input') renderInput();
  if (id === 'coeff') renderCoeff();
  if (id === 'chart') renderChart();
  if (id === 'daily') renderDaily();
  if (id === 'wells') renderWells();
}

// ===================== History =====================
let editingWell = null;
let editingDate = null;
let expandedWells = {};

function toggleExpand(well) {
  expandedWells[well] = !expandedWells[well];
  renderHistory();
}

function renderHistory() {
  const data = getData();
  const container = document.getElementById('history-cards');
  container.innerHTML = '';
  WELLS.forEach(well => {
    const rows = data[well] || [];
    rows.sort((a, b) => new Date(a.date) - new Date(b.date));
    
    const gaps = [];
    for (let i = 1; i < rows.length; i++) {
      const diff = daysDiff(rows[i-1].date, rows[i].date);
      if (diff > 1) {
        for (let d = 1; d < diff; d++) gaps.push(addDays(rows[i-1].date, d));
      }
    }
    let latestGap = null;
    if (rows.length) {
      const lastDate = rows[rows.length - 1].date;
      const diff = daysDiff(lastDate, TODAY_DATE);
      if (diff > 1) {
        for (let d = 1; d < diff; d++) { latestGap = { after: lastDate, gapDate: addDays(lastDate, d) }; break; }
      }
    }
    const noData = !rows.length;

    const gapHtml = gaps.length || latestGap || noData
      ? `<div class="mb-3 p-2 bg-red-50 border border-red-200 rounded text-sm">
          <span class="danger font-bold">⚠️ 数据不完整</span>
          ${noData ? `<p>该井暂无数据，请录入。</p>` : ''}
          ${gaps.length ? `<p>历史缺失日期：${gaps.join(', ')}</p>` : ''}
          ${latestGap && !gaps.length ? `<p>最后数据 ${latestGap.after} 至今有缺失，请补录。</p>` : ''}
          <button class="btn btn-sm mt-1" onclick="openFillGap('${well}')">✏️ 补录缺失日期</button>
        </div>`
      : '';

    const displayRows = [...rows].reverse();
    const isExpanded = !!expandedWells[well];
    const showRows = isExpanded ? displayRows : displayRows.slice(0, 5);
    const hasMore = displayRows.length > 5;

    const html = `<div class="card">
      <div class="flex justify-between items-center mb-2">
        <h3 class="font-bold text-gray-800">🔹 ${well}</h3>
        <button class="btn-sec btn-sm" onclick="exportWellCSV('${well}')">📥 导出CSV</button>
      </div>
      ${gapHtml}
      <div class="overflow-x-auto">
      <table>
        <thead>
          <tr>
            <th>日期</th><th>压力(MPa)</th><th>液量(t)</th>
            <th>油量(t)</th><th>水量(t)</th><th>含水(%)</th>
            <th>气量(m³)</th><th>气表2</th><th>累计油(t)</th><th>累计水(t)</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          ${showRows.map(r => makeHistoryRow(well, r)).join('')}
        </tbody>
      </table>
      </div>
      ${hasMore ? `<div class="mt-2 text-center">
        <button class="btn-sec btn-sm" onclick="toggleExpand('${well}')">${isExpanded ? '🔼 收起' : '🔽 显示全部'} (${displayRows.length}条)</button>
      </div>` : ''}
    </div>`;
    container.innerHTML += html;
  });
}

function makeHistoryRow(well, r) {
  const isEditing = editingWell === well && editingDate === r.date;
  if (!isEditing) {
    return `<tr>
      <td>${r.date}</td>
      <td>${r.pressure}</td>
      <td>${r.liquid}</td>
      <td class="success">${r.oil}</td>
      <td>${r.water}</td>
      <td>${r.water_ratio}</td>
      <td>${r.gas}</td>

async function deleteRow(well, date) {

function openFillGap(well) {
  const data = getData();
  const rows = data[well] || [];
  rows.sort((a, b) => new Date(a.date) - new Date(b.date));
  
  let gaps = [];
  if (!rows.length) {
    gaps.push(TODAY_DATE);
  } else {
    for (let i = 1; i < rows.length; i++) {
      const diff = daysDiff(rows[i-1].date, rows[i].date);
      if (diff > 1) {
        for (let d = 1; d < diff; d++) gaps.push(addDays(rows[i-1].date, d));
      }
    }
    const lastDate = rows[rows.length - 1].date;
    const diff = daysDiff(lastDate, TODAY_DATE);
    if (diff > 1) {
      for (let d = 1; d < diff; d++) gaps.push(addDays(lastDate, d));
    }
  }
  
  const gapDate = gaps[0];
  if (!gapDate) { alert('无缺失日期'); return; }
  
  const prev = rows.filter(r => r.date < gapDate).sort((a,b) => new Date(b.date) - new Date(a.date))[0];
  const c = getCoeff()[well];
  const defaults = {"渤页平5": { temp: 22, water: 60.23 }, "义页1-1VF": { temp: 18, water: 60.88 }, "义页1-2HF": { temp: 28, water: 85.83 }};
  const df = defaults[well] || { temp: 20, water: 60 };
  
  const pressure = prompt('补录 ' + well + ' ' + gapDate + ' 的井口压力 (MPa):', prev ? prev.pressure : '');
  if (pressure === null) return;
  const temp = prompt('出液温度 (℃):', prev ? prev.temp : df.temp);
  if (temp === null) return;
  const waterRatio = prompt('综合含水 (%):', prev ? prev.water_ratio : df.water);
  if (waterRatio === null) return;
  let gasMeter2 = null;
  if (c.gas_type === 'diff') {
    gasMeter2 = prompt('气表累计读数:', prev ? prev.gas_meter_2 : '');
    if (gasMeter2 === null) return;
  }
  
  const res = calcToday(well, parseFloat(pressure), parseFloat(temp), parseFloat(waterRatio), parseFloat(gasMeter2), prev);
  const newRows = data[well] || [];
  newRows.push({ ...res, day: newRows.length + 1, date: gapDate });
  data[well] = newRows;
  setData(data);
  recalcAllCumulative(well).then(() => {
    renderHistory();
    showImportStatus('✅ 已补录 ' + gapDate + ' 数据', 'green');
  });
}

function calcInput(well) {
  const data = getData();
  const date = document.getElementById('inp_date_' + well).value;
  const rows = data[well] || [];
  rows.sort((a, b) => new Date(a.date) - new Date(b.date));
  let prev = null;
  for (let i = rows.length - 1; i >= 0; i--) {
    if (rows[i].date < date) { prev = rows[i]; break; }
  }
  
  const pressure = parseFloat(document.getElementById('inp_pressure_' + well).value) || 0;
  const temp = parseFloat(document.getElementById('inp_temp_' + well).value) || 0;
  const waterRatio = parseFloat(document.getElementById('inp_water_' + well).value) || 0;
  let gasMeter2 = null;
  const gasInput = document.getElementById('inp_gas_' + well);
  if (gasInput) gasMeter2 = parseFloat(gasInput.value) || 0;
  if (!pressure) {
    document.getElementById('result_' + well).classList.add('hidden');
    return;
  }
  const res = calcToday(well, pressure, temp, waterRatio, gasMeter2, prev);
  previewRecords[well] = res;
  document.getElementById('result_' + well).classList.remove('hidden');
  document.getElementById('res_liquid_' + well).textContent = res.liquid;
  document.getElementById('res_oil_' + well).textContent = res.oil;
  document.getElementById('res_water_' + well).textContent = res.water;
  document.getElementById('res_gas_' + well).textContent = res.gas;
  const gasMeter2El = document.getElementById('res_gas_meter_2_' + well);
  if (gasMeter2El) gasMeter2El.textContent = res.gas_meter_2 || '−';
  document.getElementById('res_cumo_' + well).textContent = res.cum_oil;
}

function downloadPreviewCSV() {
  if (!Object.keys(previewRecords).length) return;
  const headers = ['井号','日期','压力(MPa)','出液温度(℃)','液量(t)','油量(t)','水量(t)','含水(%)','气量(m³)','气表2(m³)','累计油(t)','累计水(t)','累计气(m³)'];
  const lines = [headers.join(',')];
  WELLS.forEach(well => {
    const r = previewRecords[well]; if (!r) return;
    const date = document.getElementById('inp_date_' + well).value;
    lines.push([well, date, r.pressure, r.temp, r.liquid, r.oil, r.water, r.water_ratio, r.gas, r.gas_meter_2 || '', r.cum_oil, r.cum_water, r.cum_gas].join(','));
  });
  const blob = new Blob([lines.join('\n')], {type: 'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'today_preview.csv';
  link.click();
}

async function saveToday() {
  const data = getData();
  const coeff = getCoeff();
  let saved = 0;
  for (const well of WELLS) {
    const date = document.getElementById('inp_date_' + well).value;
    const pressure = parseFloat(document.getElementById('inp_pressure_' + well).value) || 0;
    if (!pressure) continue;
    const temp = parseFloat(document.getElementById('inp_temp_' + well).value) || 0;
    const waterRatio = parseFloat(document.getElementById('inp_water_' + well).value) || 0;
    let gasMeter2 = null;
    const gasInput = document.getElementById('inp_gas_' + well);
    if (gasInput) gasMeter2 = parseFloat(gasInput.value) || 0;
    const rows = data[well] || [];
    rows.sort((a, b) => new Date(a.date) - new Date(b.date));
    let prev = null;
    for (let i = rows.length - 1; i >= 0; i--) {
      if (rows[i].date < date) { prev = rows[i]; break; }
    }
    const res = calcToday(well, pressure, temp, waterRatio, gasMeter2, prev);
    const existing = rows.findIndex(r => r.date === date);
    if (existing >= 0) {
      rows[existing] = { ...res, day: rows[existing].day, date };
    } else {
      rows.push({ ...res, day: rows.length + 1, date });
    }
    data[well] = rows;
    saved++;
  }
  if (!saved) { alert('请至少录入一口井的数据'); return; }
  setData(data);
  for (const well of WELLS) {
    await recalcAllCumulative(well);
  }
  await syncData();
  alert('✅ 已保存 ' + saved + ' 口井的今日数据');
  switchTab('history');
}

          return `<td class="text-center">${r?r.gas:'−'} <span class="${c.cls} text-xs">${c.icon}${Math.abs(c.val)}</span></td>`;
        }).join('')}</tr>
        <tr><td class="font-semibold">累计油 (t)</td>${WELLS.map(w => `<td class="text-center info">${dailyData[w]?dailyData[w].cum_oil:'−'}</td>`).join('')}</tr>
      </tbody>
    </table>
    </div>
  </div>`;
  
  let detailHtml = `<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">`;
  WELLS.forEach(well => {
    const r = dailyData[well]; if (!r) return;
    const p = prevData[well];
    const co = calcChange(r, p, 'oil'); const cl = calcChange(r, p, 'liquid');
    const cw = calcChange(r, p, 'water'); const cpr = calcChange(r, p, 'pressure');
    const allRows = data[well] || [];
    allRows.sort((a, b) => new Date(a.date) - new Date(b.date));
    const idx = allRows.findIndex(row => row.date === selectedDate);
    const recent7 = idx >= 0 ? allRows.slice(Math.max(0, idx - 6), idx + 1) : allRows.slice(-7);
    
    detailHtml += `<div class="card border-blue-100">
      <h4 class="font-bold text-gray-800 mb-2 border-b pb-1">🔹 ${well}</h4>
      <div class="space-y-1 text-sm">
        <div class="flex justify-between"><span class="text-gray-600">井口压力</span><span class="font-semibold">${r.pressure} MPa <span class="${cpr.cls} text-xs">${cpr.icon}${Math.abs(cpr.val)}</span></span></div>
        <div class="flex justify-between"><span class="text-gray-600">出液温度</span><span class="font-semibold">${r.temp} ℃</span></div>
        <div class="flex justify-between"><span class="text-gray-600">日产液</span><span class="font-semibold">${r.liquid} t <span class="${cl.cls} text-xs">${cl.icon}${Math.abs(cl.val)}</span></span></div>
        <div class="flex justify-between"><span class="text-gray-600 text-green-700">日产油</span><span class="font-bold success">${r.oil} t <span class="${co.cls} text-xs">${co.icon}${Math.abs(co.val)} (${co.icon}${Math.abs(co.pct)}%)</span></span></div>
        <div class="flex justify-between"><span class="text-gray-600">日产水</span><span class="font-semibold">${r.water} t <span class="${cw.cls} text-xs">${cw.icon}${Math.abs(cw.val)}</span></span></div>
        <div class="flex justify-between"><span class="text-gray-600">含水率</span><span class="font-semibold">${r.water_ratio}%</span></div>
        <div class="flex justify-between"><span class="text-gray-600">气量</span><span class="font-semibold">${r.gas} m³</span></div>
        <div class="flex justify-between"><span class="text-gray-600">气表2读数</span><span class="font-semibold">${r.gas_meter_2 || '−'} m³</span></div>
        <div class="flex justify-between"><span class="text-gray-600">累计油</span><span class="font-semibold info">${r.cum_oil} t</span></div>
        <div class="flex justify-between"><span class="text-gray-600">累计水</span><span class="font-semibold">${r.cum_water} t</span></div>
        <div class="flex justify-between"><span class="text-gray-600">累计气</span><span class="font-semibold">${r.cum_gas} m³</span></div>
      </div>
      <div class="mt-3" style="height:120px">
        <canvas id="daily_chart_${well.replace(/[^a-zA-Z0-9]/g, '_')}"></canvas>
      </div>
    </div>`;
    
    setTimeout(() => {
      const ctx = document.getElementById('daily_chart_' + well.replace(/[^a-zA-Z0-9]/g, '_'));
      if (!ctx) return;
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: recent7.map(r => r.date.slice(5)),
          datasets: [
            { label: '油(t)', data: recent7.map(r => r.oil), borderColor: '#16a34a', tension: 0.3, pointRadius: 2, borderWidth: 1.5 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { ticks: { font: { size: 9 } }, grid: { display: false } }, y: { ticks: { font: { size: 9 } }, grid: { color: '#f3f4f6' } } }
        }
      });
    }, 50);
  });
  detailHtml += `</div>`;
  
  const savedNote = await getNoteAPI(selectedDate);
  detailHtml += `<div class="card bg-gray-50 mt-4">
    <h4 class="font-bold text-gray-800 mb-2">📝 日报备注</h4>
    <textarea id="daily-note" class="input" rows="3" placeholder="填写今日生产备注、异常情况、工作安排等..." onblur="saveDailyNote()">${savedNote}</textarea>
    <p class="text-xs text-gray-500 mt-1">备注自动保存到数据库。</p>
  </div>`;
  
  container.innerHTML = summaryHtml + detailHtml;
}

async function saveDailyNote() {
  const date = document.getElementById('daily-date').value;
  const note = document.getElementById('daily-note').value;
  if (date) await saveNoteAPI(date, note);
}

async function exportDailyPDF() {
  const area = document.getElementById('daily-report-area');
  if (!area || area.innerHTML.includes('暂无数据')) { alert('请先生成日报'); return; }
  const { jsPDF } = window.jspdf;
  const canvas = await html2canvas(area, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
  const imgData = canvas.toDataURL('image/png');
  const pdf = new jsPDF('p', 'mm', 'a4');
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const imgWidth = pageWidth - 20;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;
  let heightLeft = imgHeight, position = 10;
  pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
  heightLeft -= (pageHeight - 20);
  while (heightLeft > 0) {
    position = heightLeft - imgHeight + 10;
    pdf.addPage();
    pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
    heightLeft -= (pageHeight - 20);
  }
  pdf.save(`oil_daily_report_${document.getElementById('daily-date').value}.pdf`);
}

async function exportDailyPNG() {
  const area = document.getElementById('daily-report-area');
  if (!area || area.innerHTML.includes('暂无数据')) { alert('请先生成日报'); return; }
  const canvas = await html2canvas(area, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = `oil_daily_report_${document.getElementById('daily-date').value}.png`;
  link.click();
}

// ===================== Well Management =====================
function renderWells() {
  const container = document.getElementById('wells-list');
  container.innerHTML = '';
  WELLS.forEach(well => {
    const html = `<span class="well-tag">${well} <span class="del" onclick="removeWell('${well}')">×</span></span>`;
    container.innerHTML += html;
  });
}

async function addWell() {
  const name = document.getElementById('new-well-name').value.trim();
  if (!name) { alert('请输入井名'); return; }
  if (WELLS.includes(name)) { alert('该井名已存在'); return; }
  WELLS.push(name);
  _coeff[name] = { liquid: 1, gas_type: 'multiply', gas_factor: 0 };
  await addWellAPI(name);
  await syncData();
  document.getElementById('new-well-name').value = '';
  renderWells();
  showImportStatus('✅ 已添加 ' + name, 'green');
}

async function removeWell(name) {
  if (!confirm('确定删除 ' + name + '？该井的所有数据将被清空！')) return;
  WELLS = WELLS.filter(w => w !== name);
  delete _data[name];
  delete _coeff[name];
  await deleteWellAPI(name);
  await syncData();
  renderWells();
  showImportStatus('已删除 ' + name, 'green');
}

// ===================== Import/Export =====================

  const blob = new Blob([JSON.stringify({wells: WELLS, data: _data, coeff: _coeff}, null, 2)], {type: 'application/json'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'oil_well_backup.json';
  link.click();
}

    });

async function exportWellCSV(well) {
  const headers = ['日期','压力(MPa)','出液温度(℃)','液量(t)','油量(t)','水量(t)','含水(%)','气量(m³)','气表2(m³)','累计油(t)','累计水(t)','累计气(m³)'];

async function importJSON(event) {
  const file = event.target.files[0]; if (!file) return;
  const text = await file.text();
  try {
    const json = JSON.parse(text);
    if (json.wells) WELLS = json.wells;
    if (json.data) _data = json.data;
    if (json.coeff) _coeff = json.coeff;
    await syncData();
    renderHistory();
    showImportStatus('✅ JSON 导入成功', 'green');
  } catch (e) {
    showImportStatus('❌ JSON 格式错误: ' + e.message, 'red');
  }
}

async function importCSV(event) {
  const file = event.target.files[0]; if (!file) return;
  const text = await file.text();
  const lines = text.split('\n').filter(l => l.trim());
  if (!lines.length) { showImportStatus('❌ CSV 为空', 'red'); return; }
  const headers = lines[0].split(',').map(h => h.trim());
  try {
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',');
      if (cols.length < 9) continue;
      const well = cols[0].trim();
      const date = cols[1].trim();
      const pressure = parseFloat(cols[2]) || 0;
      const temp = parseFloat(cols[3]) || 0;
      const liquid = parseFloat(cols[4]) || 0;
      const oil = parseFloat(cols[5]) || 0;
      const water = parseFloat(cols[6]) || 0;
      const water_ratio = parseFloat(cols[7]) || 0;
      const gas = parseFloat(cols[8]) || 0;
      const gas_meter_2 = cols[9] ? parseFloat(cols[9]) : 0;
      const cum_oil = parseFloat(cols[10]) || 0;
      const cum_water = parseFloat(cols[11]) || 0;
      const cum_gas = parseFloat(cols[12]) || 0;
      if (!WELLS.includes(well)) WELLS.push(well);
      if (!_data[well]) _data[well] = [];
      const existing = _data[well].findIndex(r => r.date === date);
      const row = { date, pressure, temp, liquid, oil, water, water_ratio, gas, gas_meter_2, cum_oil, cum_water, cum_gas, day: _data[well].length + 1 };
      if (existing >= 0) _data[well][existing] = row; else _data[well].push(row);
    }
    await syncData();
    renderHistory();
    showImportStatus('✅ CSV 导入成功', 'green');
  } catch (e) {
    showImportStatus('❌ CSV 解析错误: ' + e.message, 'red');
  }
}

async function resetToDefault() {
  if (!confirm('确定恢复示例数据？当前数据将被覆盖！')) return;
  _data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  _coeff = JSON.parse(JSON.stringify(DEFAULT_COEFF));
  WELLS = Object.keys(DEFAULT_DATA);
  await syncData();
  renderHistory();
  showImportStatus('✅ 已恢复示例数据', 'green');
}

async function clearAllData() {
  if (confirm('⚠️ 确定清空全部数据？此操作不可恢复！')) {
    _data = {};
    _coeff = {};
    WELLS = [];
    await syncData();
    renderHistory();
    showImportStatus('已清空全部数据', 'red');
  }
}

function showImportStatus(msg, color) {
  const el = document.getElementById('import-status');
  el.textContent = msg;
  el.className = 'text-sm mt-2 font-bold';
  el.style.color = color === 'green' ? '#16a34a' : (color === 'red' ? '#dc2626' : '#2563eb');
  el.classList.remove('hidden');
}
